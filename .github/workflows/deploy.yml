name: Simsimi Auto Deploy

on:
  push:
    branches: [ "main" ] # Hoặc "master" tùy nhánh chính của bạn

jobs:
  deploy-local:
    runs-on: self-hosted # Chạy trên máy bạn đã cài Runner
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        shell: powershell
        run: |
          # 1. TẠO FILE .ENV CHO FRONTEND
          # Thêm CI=false để bỏ qua các cảnh báo khắt khe khi build
          "VITE_API_URL=http://localhost:5000" | Out-File -FilePath ./simsimiFE/.env -Encoding utf8
          "CI=false" | Out-File -FilePath ./simsimiFE/.env -Encoding utf8 -Append

          # 2. KIỂM TRA VÀ BUILD VỚI DOCKER COMPOSE
          # Lệnh này sẽ tự động build lại image và cập nhật container
          docker compose up -d --build