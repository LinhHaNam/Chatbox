name: Simsimi Auto Deploy

on:
  push:
    branches: [ "main" ] # Hoặc "master" tùy nhánh chính của bạn

jobs:
  deploy-local:
    runs-on: self-hosted # Chạy trên cái máy bạn vừa cài Runner
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        shell: powershell
        run: |
          # 1. TẠO FILE .ENV TẠM THỜI CHO FRONTEND
          # Lệnh này sẽ tạo ra file .env bên trong thư mục simsimiFE để Vite có thể đọc được khi build
          "VITE_API_URL=http://localhost:5000" | Out-File -FilePath ./simsimiFE/.env -Encoding utf8

$env:CI = "false"

                   docker compose up -d --build