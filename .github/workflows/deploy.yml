name: Simsimi Auto Deploy

on:
  push:
    branches: [ "main" ] # Hoặc "master" tùy nhánh chính của bạn

jobs:
  deploy-local:
    runs-on: self-hosted # Chạy trên cái máy bạn vừa cài Runner
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        shell: pwsh # Sử dụng PowerShell trên máy bạn
        run: |
          # Di chuyển vào thư mục chứa code (GitHub tự động tải về thư mục làm việc của Runner)
          # Lệnh này sẽ build lại các Dockerfile và khởi động lại container
          docker compose down
          docker compose up -d --build