services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: simsimi-db
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sql_data_v2:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - simsimi-network

  backend:
    build:
      context: ./SimsimiChat
    container_name: simsimi-backend
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=tcp:db,1433;Database=SimsimiDb;User Id=sa;Password=${DB_PASSWORD};Encrypt=False;TrustServerCertificate=True;
      
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "SimsimiChatApp"
      Jwt__Audience: "SimsimiChatUsers"
      Jwt__AccessTokenExpirationMinutes: 15
      Jwt__RefreshTokenExpirationDays: 7

      # --- CẤU HÌNH OPENAI (Để tránh lỗi tiếp theo) ---
      OpenAI__ApiKey: "${GEMINI_API_KEY}"
      OpenAI__Model: "gemini-2.5-flash"
      
      Cors__AllowedOrigins__0: http://localhost:3000
      Cors__AllowedOrigins__1: http://localhost:5173
      Cors__AllowedOrigins__2: http://127.0.0.1:3000
      Cors__AllowedOrigins__3: http://127.0.0.1:5173
    depends_on:
      db:
        condition: service_healthy
    networks:
      - simsimi-network

  frontend:
    build:
      context: ./simsimiFE
      args:
        VITE_API_URL: /api
    container_name: simsimi-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - simsimi-network

networks:
  simsimi-network:
    driver: bridge

volumes:
  sql_data_v2:
